<div class="p-4 rounded-xl shadow-lg card space-y-3">
  <div class="flex items-center gap-2">
    <div class="bg-gradient-to-r from-secondary to-primary text-primary-content px-2 pt-1 rounded-2xl align-baseline">
      <i class="material-symbols-outlined !text-2xl h-fit">moving</i>
    </div>
    <h2 class="text-2xl font-semibold bg-gradient-to-r from-secondary to-primary text-transparent bg-clip-text">
      Tu semana
    </h2>
  </div>

  <div class="flex items-center gap-3">

    <!--    } @else {-->
    @for (item of history; track $index) {
      <div class="flex flex-col items-center gap-3 flex-1">
        <p class="text-xs text-gray-500 font-medium">{{ item.day[0] }}</p>

        <div
          class="p-3 max-sm:py-4 flex-1 rounded-xl shadow-lg flex flex-col items-center justify-center gap-2.5 transition-all "
          [style.backgroundColor]="item.mood.color"
        >
          <img src="{{ item.mood.image }}" alt="Ícono de {{ item.mood.name }}" class="w-7 h-7 object-cover" />
        </div>

        <div class="w-full h-2 bg-base-200 rounded-full overflow-hidden relative"
        >
          <div
            class="h-full bg-current rounded-full"
            [style]="'width: ' + (item.mood.value / 5 * 100) + '%; background-color: ' + item.mood.color"
          ></div>
        </div>

      </div>
    }
    <!--    }-->
  </div>
</div>
